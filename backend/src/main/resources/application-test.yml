spring:
  datasource:
    url: jdbc:h2:mem:nubank_clone;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    expiration-minutes: 60
