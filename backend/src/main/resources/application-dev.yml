spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:nubank_clone}
    username: ${POSTGRES_USER:nubank}
    password: ${POSTGRES_PASSWORD:nubank}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: false
