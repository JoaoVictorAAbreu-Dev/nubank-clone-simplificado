services:
  postgres:
    image: postgres:16-alpine
    container_name: nubank-clone-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nubank_clone}
      POSTGRES_USER: ${POSTGRES_USER:-nubank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nubank}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nubank-clone-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
